version: "3.9"

services:
  vietnamese-text-analyzer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vietnamese-text-analyzer
    ports:
      - "5000:5000"
    environment:
      PRELOAD_MODELS_ON_STARTUP: "True"
      DEBUG: "False"
      PYTHONUNBUFFERED: "1"
    volumes:
      - vta_db:/app/src/database
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: vietnamese-text-analyzer-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - vietnamese-text-analyzer
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.5
    container_name: vietnamese-text-analyzer-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  vta_db:
  prometheus_data:
  grafana_data: