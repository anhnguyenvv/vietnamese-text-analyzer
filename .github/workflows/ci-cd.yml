name: CI-CD

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  backend-tests:
    name: Backend Tests (Pytest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run backend tests
        env:
          PRELOAD_MODELS_ON_STARTUP: "False"
        run: pytest -q

  frontend-build:
    name: Frontend Build (React)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: front-end

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: front-end/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        env:
          CI: "false"
        run: npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: front-end/build
          if-no-files-found: error

  cd-package:
    name: CD Package (main only)
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: build-artifacts/frontend-build

      - name: Prepare delivery bundle
        run: |
          mkdir -p release
          cp -r src release/src
          cp requirements.txt release/requirements.txt
          cp README.md release/README.md
          cp pytest.ini release/pytest.ini
          mkdir -p release/front-end
          cp -r build-artifacts/frontend-build release/front-end/build

      - name: Upload delivery artifact
        uses: actions/upload-artifact@v4
        with:
          name: delivery-package
          path: release
          if-no-files-found: error