global:
  resolve_timeout: 5m

route:
  receiver: default-logger
  group_by: [alertname, service]
  group_wait: 20s
  group_interval: 2m
  repeat_interval: 2h

receivers:
  - name: default-logger

inhibit_rules:
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal: [alertname, service]
